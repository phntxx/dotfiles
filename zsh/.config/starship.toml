# Disable the blank line at the start of the prompt
# add_newline = false

[cmd_duration]
min_time = 5000
style = ""
format = '[\[ $duration \]]($style)'

[username]
show_always = false
style_user = ""
style_root = ""
format = '[\[ $user \]]($style)'

[sudo]
disabled = false
symbol = "´üó"
style = ""
format = '[\[ $symbol \]]($style)'

[directory]
truncation_length = 3
truncation_symbol = "ÔÇª/"
style = ""
format = "[ $path ]($style)"

[directory.substitutions]
"Documents/Programming" = "´äí "
"Documents/Configuration" = "´ªÆ "
"Documents" = "´£ÿ "
"Downloads" = "´ÇÖ "
"Music" = "´▒ÿ "
