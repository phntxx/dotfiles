# Disable the blank line at the start of the prompt
# add_newline = false

[character]
success_symbol = "[п‘ ](bold green)"
error_symbol = "[п‘ ](bold red)"

[cmd_duration]
min_time = 5000
style = ""
format = '[\[ $duration \]]($style)'

[username]
show_always = false
style_user = ""
style_root = ""
format = '[\[ $user \]]($style)'

[sudo]
disabled = false
symbol = "пҒў"
style = ""
format = '[\[$symbol \]]($style)'

[package]
symbol = "п’Ү"
format = '[\[$symbol $version\]]($style)'

[python]
symbol = "п ҹ"
style = "yellow bold"
format = '[\[$symbol $virtualenv\]]($style)'

[nodejs]
symbol = "оһҒ"
format = '[\[$symbol \]]($style)'

[rust]
symbol = "оһЁ"
format = '[\[$symbol \]]($style)'

[git_branch]
symbol = "оӮ "
format = '[\[$symbol $branch\]]($style)'

[git_status]
format = '[\[$all_status$ahead_behind\]]($style)'

[directory]
truncation_length = 3
truncation_symbol = "вҖҰ/"

[directory.substitutions]
